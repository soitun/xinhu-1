<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>地址定位位置查看</title>
<style type="text/css">
*{
    margin:0px;
    padding:0px;
}
body, button, input, select, textarea {
    font: 12px/16px Verdana, Helvetica, Arial, sans-serif;
}

</style>
<script src="js/jquery.js"></script>
<script src="js/jsmap.js"></script>

<script src="https://api.tianditu.gov.cn/api?v=4.0&tk=<?=c('tianditu')->getKey()?>" type="text/javascript"></script>

<script>
//初始化函数
var init = function() {
	
	if(typeof(T)=='undefined'){
		document.getElementById('container').innerHTML = '无效的地图key';
		return;
	}
	var location_y = <?=$da['rs']['location_y']?>;
	var location_x = <?=$da['rs']['location_x']?>;
	var xytype = <?=arrvalue($da['rs'],'xytype','0')?>;
	
	if(xytype==0){
		const wgs = gcj02ToWgs84(location_y, location_x);
		location_y = wgs.lon;
		location_x = wgs.lat;
	}

	var precision = <?=$da['rs']['precision']?>;
	zoom= <?=$da['rs']['scale']?>;
	map = new T.Map('container');
	var lnglat = new T.LngLat(location_y, location_x);
    map.centerAndZoom(lnglat, zoom);
	//创建标注对象
	var marker = new T.Marker(lnglat);
    map.addOverLay(marker);
	
    map.addControl(new T.Control.Zoom());
	
	var markerInfoWin = new T.InfoWindow("<?=$da['rs']['content']?>");
	marker.openInfoWindow(markerInfoWin);
	
	if(precision>0){
	   var circle = new T.Circle(lnglat, precision,{color:"red",weight:1,opacity:0.5,fillColor:"#FFFFFF",fillOpacity:0.5,lineStyle:"solid"});
		//向地图上添加圆
		map.addOverLay(circle);
	}

	var type = '<?=$da['rs']['type']?>';
	if(type==1){
		var str = '<div onclick="history.back()" style="position:absolute;top:25px;left:5px; background:white;padding:8px;cursor:pointer"><img height="24" src="images/back.png" align="absmiddle">返回</div>';
		$('body').append(str);
	}
}
</script>
</head>
<body onload="init()">
<div style="width:100%;height:100%" id="container"></div>
</body>
</html>
